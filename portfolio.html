<!DOCTYPE html>
<html>
<head>
  <title>Portfolio</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { padding: 8px; margin: 5px; }
    .card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>📊 My Portfolio</h2>

<input id="symbol" placeholder="RELIANCE.NS">
<input id="buyPrice" placeholder="Buy Price">
<button onclick="addStock()">Add</button>

<div id="list"></div>

<script>

let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [];

function save() {
  localStorage.setItem("portfolio", JSON.stringify(portfolio));
}

async function fetchData(symbol) {
  let res = await fetch("/api/analyze?symbol=" + symbol);
  return await res.json();
}

function addStock() {
  let symbol = document.getElementById("symbol").value;
  let buyPrice = parseFloat(document.getElementById("buyPrice").value);

  portfolio.push({ symbol, buyPrice });
  save();
  render();
}

async function render() {
  let html = "";

  for (let s of portfolio) {
    let data = await fetchData(s.symbol);

    let pnl = ((data.price - s.buyPrice) / s.buyPrice) * 100;

    let action = "HOLD";

    if (data.decision === "BUY") action = "ADD MORE";
    if (data.decision === "SELL") action = "EXIT";

    html += `
      <div class="card">
        <h3>${s.symbol}</h3>

        Buy Price: ₹${s.buyPrice}<br>
        Current Price: ₹${data.price}<br>
        P/L: ${pnl.toFixed(2)}%<br><br>

        Decision: ${data.decision}<br>
        Action: <b>${action}</b><br>

        Reasons: ${data.reasons.join(", ")}
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
