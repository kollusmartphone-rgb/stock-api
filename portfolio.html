<!DOCTYPE html>
<html>
<head>
  <title>📊 Portfolio Dashboard</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f6f8; }
    input, button { padding: 8px; margin: 5px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th { background: #007bff; color: white; }
    .profit { color: green; }
    .loss { color: red; }
  </style>
</head>

<body>

<h2>📊 Portfolio Dashboard</h2>

<!-- INPUT SECTION -->
<input id="symbol" placeholder="Stock (RELIANCE.NS)">
<input id="buyPrice" placeholder="Buy Price">
<input id="qty" placeholder="Quantity">
<input id="date" type="date">

<button onclick="addStock()">Add</button>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>Stock</th>
      <th>Buy Price</th>
      <th>Qty</th>
      <th>Date</th>
      <th>Current Price</th>
      <th>Current Value</th>
      <th>% Change</th>
      <th>P/L</th>
      <th>Suggestion</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<script>

let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [];

function save() {
  localStorage.setItem("portfolio", JSON.stringify(portfolio));
}

async function fetchData(symbol) {
  let res = await fetch("/api/analyze?symbol=" + symbol);
  return await res.json();
}

function addStock() {
  let stock = {
    symbol: document.getElementById("symbol").value,
    buyPrice: parseFloat(document.getElementById("buyPrice").value),
    qty: parseFloat(document.getElementById("qty").value),
    date: document.getElementById("date").value
  };

  portfolio.push(stock);
  save();
  render();
}

async function render() {
  let html = "";

  for (let s of portfolio) {

    let data = await fetchData(s.symbol);

    let currentValue = data.price * s.qty;
    let invested = s.buyPrice * s.qty;
    let profit = currentValue - invested;
    let percent = ((data.price - s.buyPrice) / s.buyPrice) * 100;

    let cls = profit >= 0 ? "profit" : "loss";

    let suggestion = "HOLD";

    if (data.decision === "BUY") suggestion = "ADD MORE";
    if (data.decision === "SELL") suggestion = "SELL";

    html += `
      <tr>
        <td>${s.symbol}</td>
        <td>₹${s.buyPrice}</td>
        <td>${s.qty}</td>
        <td>${s.date}</td>
        <td>₹${data.price}</td>
        <td>₹${currentValue.toFixed(2)}</td>
        <td class="${cls}">${percent.toFixed(2)}%</td>
        <td class="${cls}">₹${profit.toFixed(2)}</td>
        <td><b>${suggestion}</b></td>
      </tr>
    `;
  }

  document.getElementById("tableBody").innerHTML = html;
}

render();

</script>

</body>
</html>
