<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
</head>

<body>

<h2>🚀 Stock Analyzer</h2>

<input id="symbol" placeholder="RELIANCE.NS">
<button onclick="run()">Analyze</button>
<a href="portfolio.html">📊 Go to Portfolio</a>
<div id="result"></div>

<script>
async function run() {
  let symbol = document.getElementById("symbol").value;

  try {
    let data = await fetch("/api/analyze?symbol=" + symbol)
      .then(r => r.json());

    if (data.error) {
      document.getElementById("result").innerHTML = data.error;
      return;
    }

    document.getElementById("result").innerHTML = `
      <h3>${data.symbol}</h3>

      Price: ₹${data.price}<br>
      Change: ${data.change}%<br>
      Volume: ${data.volume}<br><br>

      PE: ${data.pe ?? "N/A"}<br><br>

      Decision: <b>${data.decision}</b><br>
      Score: ${data.score}<br>
      Confidence: ${data.confidence}<br><br>

      Reasons: ${data.reasons.join(", ")}
    `;
  } catch (err) {
    document.getElementById("result").innerHTML = "Error fetching data";
  }
}
</script>

</body>
</html>
