<!DOCTYPE html>
<html>
<head>
  <title>Stock Analyzer</title>
</head>

<body>

<h2>🚀 Stock Analyzer</h2>

<input id="symbol" placeholder="RELIANCE.NS">
<button onclick="run()">Analyze</button>

<div id="result"></div>

<script>
async function run() {
  let symbol = document.getElementById("symbol").value;

  let stock = await fetch("/api/stock?symbol=" + symbol).then(r => r.json());

  let evalRes = await fetch(`/api/evaluate?price=${stock.price}&change=${stock.change}`)
    .then(r => r.json());

  document.getElementById("result").innerHTML = `
    <h3>${symbol}</h3>
    Price: ₹${stock.price}<br>
    Change: ${stock.change.toFixed(2)}%<br><br>

    Decision: <b>${evalRes.decision}</b><br>
    Score: ${evalRes.score}<br>
    Reasons: ${evalRes.reasons.join(", ")}
  `;
}
</script>

</body>
</html>
